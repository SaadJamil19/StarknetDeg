services:
  db:
    image: postgres:16-alpine
    container_name: starknet-db-1
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=1GB
      - -c
      - work_mem=16MB
    ports:
      - "${PGHOST_BIND_ADDRESS:-127.0.0.1}:${PGHOST_PORT:-5438}:5432"
    environment:
      POSTGRES_DB: ${PGDATABASE:-StarknetDeg}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Keep SQL files mounted for operator access/debugging only.
      # We intentionally do not mount directly at /docker-entrypoint-initdb.d
      # because mixed filename ordering can break first-boot initialization.
      # Schema creation is owned by app migrations (npm run migrate).
      - ./sql:/docker-entrypoint-initdb.d/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-StarknetDeg}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  app:
    container_name: starknet-app
    image: ${STARKNETDEG_IMAGE:-starknetdeg-app:latest}
    build:
      context: .
      target: production
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "${NODE_OPTIONS:---max-old-space-size=4096 --max-semi-space-size=128}"
      DATABASE_URL: ""
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-StarknetDeg}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      RUN_MIGRATIONS: "true"
      DB_WAIT_RETRIES: ${DB_WAIT_RETRIES:-60}
      DB_WAIT_DELAY_SECONDS: ${DB_WAIT_DELAY_SECONDS:-2}
      MIGRATION_RETRIES: ${MIGRATION_RETRIES:-60}
      MIGRATION_RETRY_DELAY_MS: ${MIGRATION_RETRY_DELAY_MS:-1000}
      PGSTATEMENT_TIMEOUT_MS: ${PGSTATEMENT_TIMEOUT_MS:-60000}
      PGQUERY_TIMEOUT_MS: ${PGQUERY_TIMEOUT_MS:-65000}
      PGIDLE_TIMEOUT_MS: ${PGIDLE_TIMEOUT_MS:-10000}
      DB_POOL_MAX: ${DB_POOL_MAX_MAIN:-10}
      INDEXER_PREFETCH_CONCURRENCY_CAP: ${INDEXER_PREFETCH_CONCURRENCY_CAP:-64}
      STARKNET_RPC_DYNAMIC_BATCHING: ${STARKNET_RPC_DYNAMIC_BATCHING:-true}
      STARKNET_RPC_DYNAMIC_BATCH_MAX_REQUESTS: ${STARKNET_RPC_DYNAMIC_BATCH_MAX_REQUESTS:-1000}
      STARKNET_RPC_DYNAMIC_BATCH_MIN_REQUESTS: ${STARKNET_RPC_DYNAMIC_BATCH_MIN_REQUESTS:-20}
      STARKNET_RPC_DYNAMIC_BATCH_LOOKBACK: ${STARKNET_RPC_DYNAMIC_BATCH_LOOKBACK:-5}
      STARKNET_RPC_DYNAMIC_BATCH_LOW_TX_THRESHOLD: ${STARKNET_RPC_DYNAMIC_BATCH_LOW_TX_THRESHOLD:-10}
      STARKNET_RPC_REQUEST_TIMEOUT_MS: ${STARKNET_RPC_REQUEST_TIMEOUT_MS:-30000}
      STARKNET_RPC_KEEPALIVE: ${STARKNET_RPC_KEEPALIVE:-true}
      STARKNET_RPC_KEEPALIVE_MSECS: ${STARKNET_RPC_KEEPALIVE_MSECS:-15000}
      STARKNET_RPC_MAX_SOCKETS: ${STARKNET_RPC_MAX_SOCKETS:-512}
      STARKNET_RPC_MAX_FREE_SOCKETS: ${STARKNET_RPC_MAX_FREE_SOCKETS:-128}
      INDEXER_FAST_HEADER_PROBE: ${INDEXER_FAST_HEADER_PROBE:-true}
      INDEXER_TURBO_SESSION_FSYNC_OFF: ${INDEXER_TURBO_SESSION_FSYNC_OFF:-false}
      INDEXER_TURBO_LOCAL_PREFETCH_SIZE: ${INDEXER_TURBO_LOCAL_PREFETCH_SIZE:-32MB}
      HEALTHCHECK_PORT: ${HEALTHCHECK_PORT:-3100}
      HEALTHCHECK_PM2_TIMEOUT_MS: ${HEALTHCHECK_PM2_TIMEOUT_MS:-3000}
      PM2_REQUIRED_PROCESSES: ${PM2_REQUIRED_PROCESSES:-main-indexer,phase4-workers,phase6-workers,l1-indexer,l1-matcher}
      EXIT_ON_DB_DISCONNECT: ${EXIT_ON_DB_DISCONNECT:-true}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:${HEALTHCHECK_PORT:-3100}/healthz > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - app_network

  backfill-worker:
    image: ${STARKNETDEG_IMAGE:-starknetdeg-app:latest}
    build:
      context: .
      target: production
    profiles:
      - backfill
    restart: on-failure
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "${NODE_OPTIONS:---max-old-space-size=4096 --max-semi-space-size=128}"
      DATABASE_URL: ""
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-StarknetDeg}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      RUN_MIGRATIONS: "false"
      DB_WAIT_RETRIES: ${DB_WAIT_RETRIES:-60}
      DB_WAIT_DELAY_SECONDS: ${DB_WAIT_DELAY_SECONDS:-2}
      PGSTATEMENT_TIMEOUT_MS: ${PGSTATEMENT_TIMEOUT_MS:-60000}
      PGQUERY_TIMEOUT_MS: ${PGQUERY_TIMEOUT_MS:-65000}
      PGIDLE_TIMEOUT_MS: ${PGIDLE_TIMEOUT_MS:-10000}
      BACKFILL_WORKER_MODE: "true"
      DB_POOL_MAX: ${DB_POOL_MAX_BACKFILL:-5}
      INDEXER_TURBO_MODE: ${INDEXER_TURBO_MODE:-true}
      INDEXER_SKIP_REALTIME: "true"
      BACKFILL_TOTAL_WORKERS: ${BACKFILL_TOTAL_WORKERS:-24}
      BACKFILL_CHUNK_SIZE: ${BACKFILL_CHUNK_SIZE:-2000000}
      BACKFILL_WINDOW_SIZE: ${BACKFILL_WINDOW_SIZE:-2000}
      BACKFILL_WINDOW_MAX: ${BACKFILL_WINDOW_MAX:-2000}
      BACKFILL_PARALLELISM: ${BACKFILL_PARALLELISM:-24}
      BACKFILL_POLL_INTERVAL_MS: ${BACKFILL_POLL_INTERVAL_MS:-1000}
      BACKFILL_SMALL_BLOCK_TX_THRESHOLD: ${BACKFILL_SMALL_BLOCK_TX_THRESHOLD:-5}
      BACKFILL_SMALL_BLOCK_GROWTH_FACTOR: ${BACKFILL_SMALL_BLOCK_GROWTH_FACTOR:-2}
      BACKFILL_INDEXER_KEY_PREFIX: ${BACKFILL_INDEXER_KEY_PREFIX:-starknetdeg-mainnet-backfill}
      BACKFILL_INDEX_LEADER: ${BACKFILL_INDEX_LEADER:-auto}
      BACKFILL_FAST_HEADER_ONLY: ${BACKFILL_FAST_HEADER_ONLY:-true}
      BACKFILL_USE_UNLOGGED_TABLES: ${BACKFILL_USE_UNLOGGED_TABLES:-true}
      BACKFILL_UNLOGGED_TABLES: ${BACKFILL_UNLOGGED_TABLES:-stark_block_journal,stark_transfers}
      BACKFILL_WORKER_CLAIM_TTL_MS: ${BACKFILL_WORKER_CLAIM_TTL_MS:-120000}
      BACKFILL_WORKER_CLAIM_RETRY_MS: ${BACKFILL_WORKER_CLAIM_RETRY_MS:-1000}
      INDEXER_PREFETCH_CONCURRENCY_CAP: ${INDEXER_PREFETCH_CONCURRENCY_CAP:-64}
      STARKNET_RPC_DYNAMIC_BATCHING: ${STARKNET_RPC_DYNAMIC_BATCHING:-true}
      STARKNET_RPC_DYNAMIC_BATCH_MAX_REQUESTS: ${STARKNET_RPC_DYNAMIC_BATCH_MAX_REQUESTS:-1000}
      STARKNET_RPC_DYNAMIC_BATCH_MIN_REQUESTS: ${STARKNET_RPC_DYNAMIC_BATCH_MIN_REQUESTS:-20}
      STARKNET_RPC_DYNAMIC_BATCH_LOOKBACK: ${STARKNET_RPC_DYNAMIC_BATCH_LOOKBACK:-5}
      STARKNET_RPC_DYNAMIC_BATCH_LOW_TX_THRESHOLD: ${STARKNET_RPC_DYNAMIC_BATCH_LOW_TX_THRESHOLD:-10}
      STARKNET_RPC_REQUEST_TIMEOUT_MS: ${STARKNET_RPC_REQUEST_TIMEOUT_MS:-30000}
      STARKNET_RPC_KEEPALIVE: ${STARKNET_RPC_KEEPALIVE:-true}
      STARKNET_RPC_KEEPALIVE_MSECS: ${STARKNET_RPC_KEEPALIVE_MSECS:-15000}
      STARKNET_RPC_MAX_SOCKETS: ${STARKNET_RPC_MAX_SOCKETS:-512}
      STARKNET_RPC_MAX_FREE_SOCKETS: ${STARKNET_RPC_MAX_FREE_SOCKETS:-128}
      INDEXER_FAST_HEADER_PROBE: ${INDEXER_FAST_HEADER_PROBE:-true}
      INDEXER_TRANSFER_UPSERT_BATCH_SIZE: ${INDEXER_TRANSFER_UPSERT_BATCH_SIZE:-5000}
      INDEXER_TRADE_UPSERT_BATCH_SIZE: ${INDEXER_TRADE_UPSERT_BATCH_SIZE:-5000}
      BACKFILL_STALE_WORKER_TIMEOUT_MS: ${BACKFILL_STALE_WORKER_TIMEOUT_MS:-30000}
      BACKFILL_HEARTBEAT_INTERVAL_MS: ${BACKFILL_HEARTBEAT_INTERVAL_MS:-5000}
      BACKFILL_STALE_WORKER_EXIT_CODE: ${BACKFILL_STALE_WORKER_EXIT_CODE:-86}
      INDEXER_TURBO_REBUILD_AT_LAG: ${INDEXER_TURBO_REBUILD_AT_LAG:-10000}
      INDEXER_TURBO_LOCAL_PREFETCH_SIZE: ${INDEXER_TURBO_LOCAL_PREFETCH_SIZE:-32MB}
      INDEXER_TURBO_SESSION_FSYNC_OFF: ${INDEXER_TURBO_SESSION_FSYNC_OFF:-false}
    command: ["node", "scripts/turbo-backfill.js"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
