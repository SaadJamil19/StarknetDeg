services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-StarknetDeg}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Keep SQL migrations available to the DB container, but let the app
      # migration runner apply them in the repository's numeric order.
      - ./sql:/docker-entrypoint-initdb.d/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-StarknetDeg}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - db_internal

  app:
    container_name: starknet-app
    image: ${STARKNETDEG_IMAGE:-starknetdeg-app:latest}
    build:
      context: .
      target: production
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ""
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-StarknetDeg}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      RUN_MIGRATIONS: "true"
      DB_WAIT_RETRIES: ${DB_WAIT_RETRIES:-60}
      DB_WAIT_DELAY_SECONDS: ${DB_WAIT_DELAY_SECONDS:-2}
      MIGRATION_RETRIES: ${MIGRATION_RETRIES:-60}
      MIGRATION_RETRY_DELAY_MS: ${MIGRATION_RETRY_DELAY_MS:-1000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
      - db_internal

networks:
  app_network:
    driver: bridge
  db_internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
